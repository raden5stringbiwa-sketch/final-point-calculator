<!DOCTYPE html>
<html lang="ja">

<head>

    
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Final Point Calculator β</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

    <!-- ======================================
         Header
    ======================================= -->

    <header class="header">

        <div class="title-area">

            <h1>Final Point Calculator β</h1>

            <div class="sub-title">

                戦況予測ツール

            </div>

        </div>

        <div class="version">

            Ver 0.2.0

        </div>

    </header>


    <div class="container">


        <!-- ======================================
             試合設定
        ======================================= -->

      

        <!-- ======================================
             ポイント入力
        ======================================= -->

        <section class="card">

            <h2>📥 ポイント入力</h2>

            <div class="battle-area">

                <!-- 青毎秒 -->

                <div class="rate blue-rate">

                    <span id="blueRate">

                        --/秒

                    </span>

                </div>


                <!-- 青カード -->

                <div class="team-card blue">

                    <h3>

                        🔵 青同盟

                    </h3>

                    <input
                        type="number"
                        id="bluePoint"
                        placeholder="0">

                </div>


                <!-- 赤カード -->

                <div class="team-card red">

                    <h3>

                        🔴 赤同盟

                    </h3>

                    <input
                        type="number"
                        id="redPoint"
                        placeholder="0">

                </div>


                <!-- 赤毎秒 -->

                <div class="rate red-rate">

                    <span id="redRate">

                        --/秒

                    </span>

                </div>

            </div>


            <br>


            <div class="setting-row">

<div class="setting-row">

    <label>
        前回記録
    </label>

    <span id="beforeTime">
        --
    </span>

</div>


<div class="setting-row">

    <label>
        残り時間
    </label>

    <input
        type="text"
        id="currentTime"
        value="24:20:"
        placeholder="mm:ss">

</div>


            <div class="button-area">

                <button id="updateButton">

                    📸 戦況を記録

                </button>

            </div>

        </section>
        <!-- ======================================
             AI判定
        ======================================= -->

        <section class="card ai-area">

            <span id="statusIcon">
                ⚪
            </span>

            <div id="statusText">

                データ待機中

            </div>

            <div class="ai-message">

                ポイントを2回入力すると予測を開始します

            </div>

        </section>


        <!-- ======================================
             結果
        ======================================= -->

        <section class="card">

            <h2>📊 予測結果</h2>

            <div class="result-grid">

                <div class="result-card">

                    <h3>

                        🔵 青 最終ポイント

                    </h3>

                    <div
                        class="result-value"
                        id="blueFinal">

                        --

                    </div>

                </div>


                <div class="result-card">

                    <h3>

                        🔴 赤 最終ポイント

                    </h3>

                    <div
                        class="result-value"
                        id="redFinal">

                        --

                    </div>

                </div>

            </div>


            <div class="big-result">

                <div class="label">

                    予想点差

                </div>

                <div
                    class="value"
                    id="pointDiff">

                    --

                </div>

            </div>


            <div
                class="need-rate"
                id="needRate">

                --

            </div>

        </section>


    </div>


    <footer>

        Final Point Calculator β
        Version 0.2.0

    </footer>


    <script src="js/app.js"></script>

</body>

</html>

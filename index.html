<!DOCTYPE html>
<html lang="ja">

<head>

    
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Final Point Calculator β</title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

    <!-- ======================================
         Header
    ======================================= -->

    <header class="header">

        <div class="title-area">

            <h1>Final Point Calculator β</h1>

            <div class="sub-title">

                戦況予測ツール

            </div>

        </div>

        <div class="version">

            Ver 0.2.0

        </div>

    </header>


    <div class="container">


        <!-- ======================================
             試合設定
        ======================================= -->

      

        <!-- ======================================
             ポイント入力
        ======================================= -->

        <section class="card">

            <h2>📥 ポイント入力</h2>

            <div class="battle-area">

                <!-- 青毎秒 -->

                <div class="rate blue-rate">

                    <span id="blueRate">

                        --/秒

                    </span>

                </div>


                <!-- 青カード -->

                <div class="team-card blue">

                    <h3>

                        🔵 青同盟

                    </h3>

                    <input
                        type="number"
                        id="bluePoint"
                        placeholder="0">

                </div>


                <!-- 赤カード -->

                <div class="team-card red">

                    <h3>

                        🔴 赤同盟

                    </h3>

                    <input
                        type="number"
                        id="redPoint"
                        placeholder="0">

                </div>


                <!-- 赤毎秒 -->

                <div class="rate red-rate">

                    <span id="redRate">

                        --/秒

                    </span>

                </div>

            </div>


            <br>


            <div class="setting-row">

<div class="setting-row">

    <label>
        前回記録
    </label>

    <span id="beforeTime">
        --
    </span>

</div>


<div class="setting-row">

    <label>
        残り時間
    </label>

    <input
        type="text"
        id="currentTime"
        value="24:20:"
        placeholder="mm:ss">

</div>


            <div class="button-area">

                <button id="updateButton">

                    📸 戦況を記録

                </button>

            </div>

        </section>
        <!-- ======================================
             AI判定
        ======================================= -->

        <section class="card ai-area">

           <section class="card ai-area">

    <div class="battle-status">

        <span id="statusIcon">
            ⚪
        </span>

        <span id="statusText">
            データ待機中
        </span>

    </div>


    <div
        class="need-rate"
        id="needRate">

        --

    </div>


</section>


        <!-- ======================================
             結果
        ======================================= -->

      <section class="card">

    <h2>📊 最終予測</h2>


    <div class="final-score">


        <div class="final-team blue-final">

            🔵 青

            <div id="blueFinal">
                --
            </div>

        </div>



        <div class="final-team red-final">

            🔴 赤

            <div id="redFinal">
                --
            </div>

        </div>


    </div>



    <div class="diff-area">

        <div>
            予想点差
        </div>


        <div id="pointDiff">

            --

        </div>


    </div>


</section>

    </div>


    <footer>

        Final Point Calculator β
        Version 0.2.0

    </footer>


    <script src="js/app.js"></script>

</body>

</html>

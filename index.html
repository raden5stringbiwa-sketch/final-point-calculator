<!-- ======================================
     ポイント入力
====================================== -->

<section class="card">

    <h2>📥 ポイント入力</h2>

    <div class="battle-area">

        <!-- 青毎秒 -->
        <div class="rate blue-rate">
            <span id="blueRate">--/秒</span>
        </div>

        <!-- 青カード -->
        <div class="team-card blue">

            <h3>🔵 青同盟</h3>

            <input
                type="number"
                id="bluePoint"
                placeholder="現在ポイント">

        </div>

        <!-- 赤カード -->
        <div class="team-card red">

            <h3>🔴 赤同盟</h3>

            <input
                type="number"
                id="redPoint"
                placeholder="現在ポイント">

        </div>

        <!-- 赤毎秒 -->
        <div class="rate red-rate">
            <span id="redRate">--/秒</span>
        </div>

    </div>

    <div class="button-area">

        <button id="updateButton">

            📸 戦況を記録

        </button>

    </div>

</section>
